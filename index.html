<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";import {getFirestore,doc,onSnapshot} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const app=initializeApp({"apiKey": "AIzaSyAMiWi3ODS8JbSI-FJ017oL-FrPV1c0oOI", "authDomain": "totomondiali-save-us-2026.firebaseapp.com", "projectId": "totomondiali-save-us-2026", "storageBucket": "totomondiali-save-us-2026.firebasestorage.app", "messagingSenderId": "202476385722", "appId": "1:202476385722:web:5d89ab909c3d78fa2c1983"}), db=getFirestore(app), liveRef=doc(db,"totomondiali","live"), $=id=>document.getElementById(id);
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m])); const norm=s=>String(s||"").trim().toLowerCase();
function cnt(a){let m=new Map;a.forEach(v=>{v=(v||"").trim();if(!v)return;let k=v.toLowerCase(),o=m.get(k)||{label:v,count:0};o.count++;m.set(k,o)});return [...m.values()].sort((a,b)=>b.count-a.count).slice(0,8)}
function stat(title,a){let c=cnt(a);return `<div class="col-lg-4"><div class="stat"><h3 class="h5">${title}</h3>${c.length?`<ul class="list-unstyled">${c.map(x=>`<li class="d-flex justify-content-between border-bottom py-1"><span>${esc(x.label)}</span><b>${x.count}</b></li>`).join("")}</ul>`:"<p class='small-muted'>Nessun dato</p>"}</div></div>`}
function byGroup(p){let o={};(p||[]).forEach(x=>{(o[x.girone]??=[]).push(x)});return o}
function scoreName(d,n){return (d.ranking||[]).find(r=>norm(r.name)===norm(n))}
function render(d){$("status").style.display="none";let r=d.ranking||[],s=d.submissions||[];podium.innerHTML=r.length?`<div class="row g-3">${r.slice(0,3).map((x,i)=>`<div class="col-md-4"><div class="podium text-center ${i==0?'first':''}"><div class="display-6">${i==0?'🥇':i==1?'🥈':'🥉'}</div><h3>${esc(x.name)}</h3><div class="score">${x.total}</div><div class="small-muted">punti</div></div></div>`).join("")}</div>`:"";ranking.innerHTML=r.length?`<table class="table table-striped"><thead><tr><th>Pos.</th><th>Nome</th><th>Totale</th><th>Partite</th><th>Marcatori</th><th>Assist</th><th>MVP</th><th>Bonus</th><th>Podio</th></tr></thead><tbody>${r.map((x,i)=>`<tr><td>${i+1}</td><td>${esc(x.name)}</td><td class="score">${x.total}</td><td>${x.breakdown?.matches||0}</td><td>${x.breakdown?.scorers||0}</td><td>${x.breakdown?.assists||0}</td><td>${x.breakdown?.mvps||0}</td><td>${x.breakdown?.bonuses||0}</td><td>${x.breakdown?.podium||0}</td></tr>`).join("")}</tbody></table>`:"<p>Classifica non disponibile.</p>";stats.innerHTML=stat("Nazioni più scelte vincenti",s.map(x=>x.torneo?.vincitore))+stat("Finaliste più scelte",s.map(x=>x.torneo?.secondo))+stat("Terzi posti più scelti",s.map(x=>x.torneo?.terzo))+stat("Marcatori più scelti",s.flatMap(x=>x.torneo?.marcatori||[]))+stat("Assist man più scelti",s.flatMap(x=>x.torneo?.assistMan||[]))+stat("MVP più scelti",s.flatMap(x=>x.torneo?.mvp||[]));profiles.innerHTML=s.map((x,i)=>profile(d,x,i)).join("")||"<p>Nessuna scheda.</p>";let o=d.official||{};official.innerHTML=`<div class="row g-3"><div class="col-md-4"><b>Vincitore:</b> ${esc(o.winner||"-")}</div><div class="col-md-4"><b>Secondo:</b> ${esc(o.second||"-")}</div><div class="col-md-4"><b>Terzo:</b> ${esc(o.third||"-")}</div><div class="col-md-4"><b>Capocannoniere:</b> ${esc(o.topScorer||"-")}</div><div class="col-md-4"><b>Miglior assist man:</b> ${esc(o.topAssist||"-")}</div><div class="col-md-4"><b>MVP:</b> ${esc(o.mvp||"-")}</div></div>`;matches.innerHTML=`<table class="table table-striped"><tbody>${(d.matches||[]).map(m=>`<tr><td>${esc(m.group)}</td><td>${esc(m.home)} vs ${esc(m.away)}</td><td><b>${m.homeGoals!==""&&m.awayGoals!==""?esc(m.homeGoals+"-"+m.awayGoals):"-"}</b></td></tr>`).join("")}</tbody></table>`}
function profile(d,s,i){let name=s.partecipante?.nome||"Senza nome",sc=scoreName(d,name),g=byGroup(s.partite||[]),t=s.torneo||{};let games=Object.keys(g).sort().map(k=>`<h5>Girone ${esc(k)}</h5><table class="table table-sm table-striped"><tbody>${g[k].map(p=>`<tr><td>${esc(p.partita||p.casa+" vs "+p.trasferta)}</td><td><b>${esc(p.esito||"-")}</b></td><td>${esc(p.goalNoGoal||"-")}</td><td>${esc(p.overUnder25||"-")}</td></tr>`).join("")}</tbody></table>`).join("");return `<div class="accordion mb-2 profile" data-name="${esc(name.toLowerCase())}"><div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#p${i}"><b>${esc(name)}</b>&nbsp;— ${sc?.total||0} punti</button></h2><div id="p${i}" class="accordion-collapse collapse"><div class="accordion-body"><h4>Pronostici torneo</h4><div class="mb-3"><span class="choice-pill"><b>Vincitore:</b> ${esc(t.vincitore||"-")}</span><span class="choice-pill"><b>Secondo:</b> ${esc(t.secondo||"-")}</span><span class="choice-pill"><b>Terzo:</b> ${esc(t.terzo||"-")}</span></div><div class="row"><div class="col-md-4"><h5>Marcatori</h5>${(t.marcatori||[]).map((x,j)=>`<div class="choice-pill">${j+1}. ${esc(x)}</div>`).join("")}</div><div class="col-md-4"><h5>Assist man</h5>${(t.assistMan||[]).map((x,j)=>`<div class="choice-pill">${j+1}. ${esc(x)}</div>`).join("")}</div><div class="col-md-4"><h5>MVP</h5>${(t.mvp||[]).map((x,j)=>`<div class="choice-pill">${j+1}. ${esc(x)}</div>`).join("")}</div></div><h4 class="mt-3">Partite</h4>${games}</div></div></div></div>`}
